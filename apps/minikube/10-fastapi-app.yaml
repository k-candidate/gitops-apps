apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://github.com/k-candidate/helm-charts.git
      targetRevision: main
      path: charts/fastapi-app
      helm:
        valueFiles:
          - $values/environments/minikube/fastapi-app/values.yaml
    - repoURL: https://github.com/k-candidate/gitops-apps.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: fastapi-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
